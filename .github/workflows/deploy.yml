name: Deploy to Fly.io

# Triggers only when the full CI workflow passes on main.
# This gates the deploy on ALL three CI jobs (backend tests, frontend
# build + typecheck, ruff lint) without duplicating any of them here.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Deploy
    # Only deploy when every CI job passed; skip on failure or cancellation.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # workflow_run events carry the SHA of the triggering commit.
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up flyctl
        # Pinned to v2 — avoid @master supply-chain risk.
        uses: superfly/flyctl-actions/setup-flyctl@v2

      # Fly builds the Docker image on its own remote AMD64 builders.
      # No Docker credentials or local build needed on the runner.
      - name: Deploy
        run: flyctl deploy --remote-only
        env:
          # Create this token with: fly tokens create deploy -x 999999h
          # Then add it to GitHub repo Settings → Secrets → FLY_API_TOKEN.
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

# ──────────────────────────────────────────────────────────────────────────────
# One-time first-deploy setup (run locally with flyctl installed):
#
#   fly apps create ai-dungeon-master
#   fly volumes create dm_data --region sin --size 1 --app ai-dungeon-master
#   fly secrets set \
#     ANTHROPIC_API_KEY="sk-ant-..." \
#     DATABASE_URL="sqlite+aiosqlite:////data/dungeon_master.db" \
#     CORS_ORIGINS="https://ai-dungeon-master.fly.dev" \
#     --app ai-dungeon-master
#   fly tokens create deploy -x 999999h   # → paste into GitHub secret FLY_API_TOKEN
# ──────────────────────────────────────────────────────────────────────────────
