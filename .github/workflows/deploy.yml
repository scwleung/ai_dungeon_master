name: Deploy to Fly.io

# Triggers only when the full CI workflow passes on main.
# This gates the deploy on ALL three CI jobs (backend tests, frontend
# build + typecheck, ruff lint) without duplicating any of them here.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Deploy
    # Only deploy when every CI job passed; skip on failure or cancellation.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # workflow_run events carry the SHA of the triggering commit.
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      # Fly builds the Docker image on its own remote AMD64 builders.
      # No Docker credentials or local build needed on the runner.
      - name: Deploy
        run: flyctl deploy --remote-only
        env:
          # Create this token with: fly tokens create deploy -x 999999h
          # Then add it to GitHub repo Settings → Secrets → FLY_API_TOKEN.
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

# ──────────────────────────────────────────────────────────────────────────────
# One-time first-deploy setup (run locally with flyctl installed):
#
#   fly apps create ai-dungeon-master
#
# ── Option A: SQLite on a persistent Fly volume (simpler, single machine) ─────
#
#   fly volumes create dm_data --region sin --size 1 --app ai-dungeon-master
#   fly secrets set \
#     ANTHROPIC_API_KEY="sk-ant-..." \
#     DATABASE_URL="sqlite+aiosqlite:////data/dungeon_master.db" \
#     CORS_ORIGINS="https://ai-dungeon-master.fly.dev" \
#     --app ai-dungeon-master
#
#   Notes:
#   - The volume attaches to one machine at a time; scale to multiple machines
#     only if you switch to PostgreSQL.
#   - Backup the volume manually with: fly ssh console -C "sqlite3 /data/dungeon_master.db .dump"
#
# ── Option B: Fly Postgres (recommended for multi-machine or production) ───────
#
#   fly postgres create \
#     --name ai-dungeon-master-db \
#     --region sin \
#     --initial-cluster-size 1 \
#     --vm-size shared-cpu-1x \
#     --volume-size 10
#
#   fly postgres attach ai-dungeon-master-db --app ai-dungeon-master
#   # ↑ Automatically sets DATABASE_URL in the app's environment.
#   # The app normalises postgres:// → postgresql+asyncpg:// at startup,
#   # so no code changes are needed.
#
#   fly secrets set \
#     ANTHROPIC_API_KEY="sk-ant-..." \
#     CORS_ORIGINS="https://ai-dungeon-master.fly.dev" \
#     --app ai-dungeon-master
#
#   Notes:
#   - Fly Postgres includes daily automated backups.
#   - Supports multiple app machines (horizontal scaling).
#   - If switching from SQLite, migrate data with:
#       fly ssh console -C "sqlite3 /data/dungeon_master.db .dump" | \
#       fly postgres connect -a ai-dungeon-master-db
#
# ── Both options: finish setup ─────────────────────────────────────────────────
#
#   fly tokens create deploy -x 999999h   # → paste into GitHub secret FLY_API_TOKEN
# ──────────────────────────────────────────────────────────────────────────────
