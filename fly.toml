app = "ai-dungeon-master"
primary_region = "sin"

[build]

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  # Prevent Fly's proxy from dropping long-lived WebSocket connections.
  # Without this the default 60-second idle timeout kills open sessions.
  idle_timeout = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "dm_data"
  destination = "/data"
  initial_size = "1gb"
